<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dentist Booking CRUD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Dentist Booking System</h1>

  <!-- Auth Section -->
  <section id="authSection">
    <h2>Authentication</h2>
    <form id="registerForm">
      <input type="text" id="regName" placeholder="Name" required>
      <input type="text" id="regTel" placeholder="Phone" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Password" required>
      <select id="regRole">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
      <button type="submit">Register</button>
    </form>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <button id="logoutBtn" style="display:none;">Logout</button>
  </section>

  <!-- CRUD Section (hidden until login) -->
  <section id="crudSection" style="display:none;">
    <!-- Dentists -->
    <h2>Dentists</h2>
    <form id="dentistForm">
      <input type="text" id="dentistName" placeholder="Name" required>
      <input type="text" id="dentistSpecialty" placeholder="Specialty" required>
      <input type="number" id="dentistExperience" placeholder="Experience (years)" required>
      <input type="text" id="dentistTel" placeholder="Telephone" required>
      <input type="text" id="dentistClinic" placeholder="Clinic Name" required>
      <button type="submit">Add Dentist</button>
    </form>
    <table id="dentistTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Specialty</th>
          <th>Experience</th>
          <th>Tel</th>
          <th>Clinic</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Bookings -->
    <h2>Bookings</h2>
    <button id="addBookingBtn">Add Booking</button>
    <table id="bookingTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>User</th>
          <th>Dentist</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="main.js"></script>
</body>
</html>
