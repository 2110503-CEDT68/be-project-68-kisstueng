<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dentist Booking CRUD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Dentist Booking System</h1>

  <!-- Auth Section -->
  <section id="authSection">
    <h2>Authentication</h2>
    <form id="registerForm">
      <input type="text" id="regName" placeholder="Name">
      <input type="text" id="regTel" placeholder="Telephone">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Password">
      <select id="regRole">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
      <button type="submit">Register</button>
    </form>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button type="submit">Login</button>
    </form>

    <button id="logoutBtn" style="display:none;">Logout</button>
  </section>

  <!-- CRUD Section (hidden until login) -->
  <section id="crudSection" style="display:none;">
    <!-- Dentists -->
    <h2>Dentists</h2>
    <form id="dentistForm">
      <input type="text" id="dentistName" placeholder="Name">
      <input type="text" id="dentistSpecialty" placeholder="Specialty">
      <input type="number" id="dentistExperience" placeholder="Experience">
      <input type="text" id="dentistTel" placeholder="Telephone">
      <button type="submit">Add Dentist</button>
    </form>
    <table id="dentistTable">
      <thead>
        <tr><th>Name</th><th>Specialty</th><th>Experience</th><th>Tel</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Appointments -->
    <h2>Appointments</h2>
    <form id="appointmentForm">
      <input type="date" id="appointmentDate">
      <input type="text" id="appointmentUser" placeholder="User ID">
      <input type="text" id="appointmentDentist" placeholder="Dentist ID">
      <button type="submit">Add Appointment</button>
    </form>
    <table id="appointmentTable">
      <thead>
        <tr><th>Date</th><th>User</th><th>Dentist</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="main.js"></script>
</body>
</html>
